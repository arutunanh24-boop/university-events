{% extends 'base.html' %}
{% block title %}Удаление мероприятия{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="content-panel">
            <h1 class="h4">Удалить мероприятие?</h1>
            <p class="text-muted">Будет удалена карточка «{{ event.title }}» вместе с регистрациями и прикрепленными материалами.</p>
            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <button class="btn btn-danger" type="submit"><i class="bi bi-trash"></i> Удалить</button>
                <a class="btn btn-outline-secondary" href="{% url 'events:event_detail' event.pk %}">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
