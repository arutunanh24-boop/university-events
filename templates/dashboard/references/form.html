{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="content-panel">
            <h1 class="h3 mb-3">{{ title }}</h1>
            <form method="post" class="row g-3">
                {% csrf_token %}
                {% for field in form %}
                    <div class="{% if field.name == 'description' or field.name == 'address' %}col-12{% else %}col-md-6{% endif %}">
                        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
                    </div>
                {% endfor %}
                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-check-lg"></i> Сохранить</button>
                    <a class="btn btn-outline-secondary" href="{% url 'dashboard:reference_list' kind %}">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
